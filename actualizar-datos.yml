name: Actualizar datos desde Google Sheets

on:
  # Se ejecuta automáticamente cada 5 minutos
  schedule:
    - cron: '*/5 * * * *'
  # También se puede ejecutar manualmente desde GitHub
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Necesario para hacer push del data.json

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Descargar datos del Google Sheet como CSV
        run: |
          curl -L \
            "https://docs.google.com/spreadsheets/d/1DiIcQc1ck2Whs4UMUwxvPLfDqVcRf2jVpPmTqAM806E/export?format=csv" \
            -o sheet_raw.csv
          echo "CSV descargado:"
          head -5 sheet_raw.csv

      - name: Convertir CSV a JSON con Python
        run: |
          python3 << 'PYEOF'
          import csv, json, sys

          # Índices de columna (base 0)
          COL = {
              "localidad":   3,   # D
              "nombre":      4,   # E
              "edad":        5,   # F
              "fecha":       7,   # H
              "hora":        8,   # I
              "descripcion": 9,   # J
              "contacto":   10,   # K
              "telefono":   11,   # L
              "foto":       13,   # N
              "estado":     14,   # O
          }

          registros = []

          with open("sheet_raw.csv", newline="", encoding="utf-8") as f:
              reader = csv.reader(f)
              filas = list(reader)

          # Omitir fila de encabezados (primera fila)
          for fila in filas[1:]:
              # Ignorar filas vacías
              nombre = fila[COL["nombre"]].strip() if len(fila) > COL["nombre"] else ""
              if not nombre:
                  continue

              # Excluir casos HALLADOS
              estado = fila[COL["estado"]].strip().upper() if len(fila) > COL["estado"] else ""
              if "HALLADO" in estado:
                  continue

              def v(col):
                  return fila[col].strip() if len(fila) > col else ""

              registros.append({
                  "localidad":   v(COL["localidad"]),
                  "nombre":      v(COL["nombre"]),
                  "edad":        v(COL["edad"]),
                  "fecha":       v(COL["fecha"]),
                  "hora":        v(COL["hora"]),
                  "descripcion": v(COL["descripcion"]),
                  "contacto":    v(COL["contacto"]),
                  "telefono":    v(COL["telefono"]),
                  "foto":        v(COL["foto"]),
                  "estado":      v(COL["estado"]),
              })

          # Invertir para mostrar el más reciente primero
          registros.reverse()

          output = {
              "actualizado": __import__("datetime").datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "total": len(registros),
              "registros": registros
          }

          with open("data.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"✅ {len(registros)} casos vigentes guardados en data.json")
          PYEOF

      - name: Limpiar CSV temporal
        run: rm -f sheet_raw.csv

      - name: Hacer commit y push del data.json actualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Solo commitea si hubo cambios reales en los datos
          git diff --staged --quiet || git commit -m "🔄 Datos actualizados $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

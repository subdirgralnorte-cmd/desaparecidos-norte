<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Búsqueda de Personas - Dirección General Departamentales Norte</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* DISEÑO WEB Y MÓVIL EN PANTALLA */
    :root { --azul-policia: #0d2545; --azul-acento: #1a6fba; --gris-claro: #f8f9fa; }
    body { font-family: 'Roboto', sans-serif; background-color: #ffffff; margin: 0; padding: 0; color: #333; }
    header { background-color: var(--azul-policia); color: white; padding: 50px 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--azul-acento); }
    .header-left h1 { margin: 0; font-family: 'Montserrat', sans-serif; font-size: 5.5rem; line-height: 0.9; text-transform: uppercase; letter-spacing: -3px; }
    .header-left p { font-size: 1.8rem; margin-top: 15px; font-weight: 400; text-transform: uppercase; margin-bottom: 0; }
    .escudo-header { height: 280px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
    .status-bar { text-align: center; padding: 10px; background: #f1f1f1; font-size: 0.9rem; color: #555; border-bottom: 1px solid #ddd; }
    .contenedor { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 40px; min-height: 60vh; }
    .ficha { display: flex; background: var(--gris-claro); border: 1px solid #ddd; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
    .col-izquierda { width: 320px; min-width: 320px; padding: 20px; background: #fff; border-right: 2px solid #000; display: flex; flex-direction: column; align-items: center; }
    
    .foto-marco { width: 280px; height: 350px; border: 4px solid #000; background: #eee; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    .foto-marco img { max-width: 100%; max-height: 100%; object-fit: contain; }
    
    .contacto-pie { margin-top: 15px; font-size: 0.8rem; font-weight: bold; color: #c0392b; text-align: center; text-transform: uppercase; }
    .col-derecha { flex-grow: 1; padding: 30px; display: flex; flex-direction: column; justify-content: center; }
    .info-linea { font-size: 1.1rem; margin-bottom: 10px; text-transform: uppercase; }
    .info-linea b { color: var(--azul-policia); }
    .btn-pdf { background-color: var(--azul-policia); color: white; border: none; padding: 12px 20px; font-size: 1rem; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 20px; align-self: flex-start; display: flex; align-items: center; gap: 8px; transition: background 0.3s; }
    .btn-pdf:hover { background-color: var(--azul-acento); }
    footer { background-color: var(--azul-policia); height: 80px; margin-top: 60px; border-top: 8px solid var(--azul-acento); width: 100%; }
    
    @media (max-width: 900px) {
      header { flex-direction: column; text-align: center; padding: 30px 20px; }
      .header-left h1 { font-size: 3rem; }
      .escudo-header { height: 180px; margin-top: 20px; }
      .ficha { flex-direction: column; }
      .col-izquierda { width: 100%; min-width: 100%; border-right: none; border-bottom: 2px solid #000; }
    }
  </style>
</head>
<body>

  <header id="cabecera-institucional">
    <div class="header-left">
      <h1>Búsqueda de<br>Personas</h1>
      <p>Dirección General Departamentales Norte</p>
    </div>
    <img src="Diapositiva1-removebg-preview.png" alt="Escudo Policía" class="escudo-header">
  </header>

  <div class="status-bar" id="status-txt">Conectando con base de datos policial...</div>

  <main id="contenedor-fichas" class="contenedor">
    <div style="text-align:center; padding:50px; font-size: 1.2rem;">Cargando registros oficiales...</div>
  </main>

  <footer id="pie-institucional"></footer>

  <script>
    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbw8m7K4ogyIhubFaTUUG5gn-lcb75NJlM708VM1yoHCuiOmhpF4WfHbvaKOE4ZmRNBl/exec';
    let datosGlobales = [];

    function formatDriveLink(url) {
      if (!url) return '';
      const match = url.match(/(?:id=|d\/)([a-zA-Z0-9_-]+)/);
      return match ? `https://drive.google.com/thumbnail?id=${match[1]}&sz=w800` : url; 
    }

    function limpiarTexto(texto) {
      if (!texto) return '-';
      if (texto.includes('T') && texto.includes('1899')) {
        let d = new Date(texto);
        return d.toLocaleTimeString('es-AR', {hour: '2-digit', minute:'2-digit'});
      }
      if (texto.includes('T') && texto.length > 15) {
        let p = texto.split('T')[0].split('-');
        return `${p[2]}/${p[1]}/${p[0]}`;
      }
      return texto;
    }

    async function cargarDatos() {
      try {
        const res = await fetch(URL_SCRIPT + "?nocache=" + new Date().getTime());
        datosGlobales = await res.json();
        renderizarFichas();
        const ahora = new Date().toLocaleTimeString('es-AR');
        document.getElementById('status-txt').innerText = `En vivo vía App Script: ${ahora} - ${datosGlobales.length} registros`;
      } catch (e) {
        document.getElementById('status-txt').innerText = 'Error de conexión con el Script en vivo.';
      }
    }

    function renderizarFichas() {
      const contenedor = document.getElementById('contenedor-fichas');
      if (datosGlobales.length === 0) {
        contenedor.innerHTML = '<h2 style="text-align:center; color:#c0392b;">No hay alertas vigentes en este momento.</h2>';
        return;
      }

      contenedor.innerHTML = datosGlobales.map((r, i) => `
        <article class="ficha">
          <div class="col-izquierda">
            <div class="foto-marco">
              <img src="${formatDriveLink(r.foto)}" onerror="this.src='https://via.placeholder.com/280x350?text=SIN+IMAGEN'">
            </div>
            <div class="contacto-pie">
              INFORMAR A:<br>${r.contacto || 'Dependencia Policial'}<br><br>
              TEL: ${r.telefono || '-'} / 911
            </div>
          </div>
          <div class="col-derecha">
            <div class="info-linea"><b>DESAPARECIDO EN:</b> ${limpiarTexto(r.localidad)}</div>
            <div class="info-linea"><b>FECHA:</b> ${limpiarTexto(r.fecha)} | <b>HORA:</b> ${limpiarTexto(r.hora)}</div>
            <br>
            <div class="info-linea"><b>NOMBRE:</b> ${r.nombre}</div>
            <div class="info-linea"><b>EDAD:</b> ${r.edad} AÑOS</div>
            <br>
            <div class="info-linea"><b>DESCRIPCIÓN / VESTIMENTA:</b></div>
            <div style="font-size:0.95rem; line-height:1.4; text-align:justify; margin-bottom:10px;">${r.descripcion || 'Sin datos'}</div>
            <div class="info-linea"><b>RESEÑA DEL HECHO:</b></div>
            <div style="font-size:0.95rem; line-height:1.4; text-align:justify;">${r.resena || 'Sin reseña'}</div>
            
            <button class="btn-pdf" onclick="descargarPDF(${i})">📄 Descargar PDF</button>
          </div>
        </article>
      `).join('');
    }

    // MOTOR DE IMPRESIÓN RÍGIDO ANTIDEFORMACIONES
    function descargarPDF(index) {
      const r = datosGlobales[index];
      const statusOriginal = document.getElementById('status-txt').innerText;
      document.getElementById('status-txt').innerText = '⏳ Generando Alerta Oficial en Alta Calidad... Por favor espere.';

      const tempDiv = document.createElement('div');
      tempDiv.style.position = 'absolute';
      tempDiv.style.top = '-9999px';
      tempDiv.style.left = '0';
      tempDiv.style.width = '794px';
      tempDiv.style.height = '1123px';
      tempDiv.style.overflow = 'hidden';
      
      // Maquetación absoluta por tabla para evitar fallas de escalado en dispositivos móviles
      tempDiv.innerHTML = `
        <table id="molde-impresion" width="794" height="1123" border="0" cellspacing="0" cellpadding="0" style="width: 794px; height: 1123px; background: #ffffff; font-family: 'Roboto', sans-serif; table-layout: fixed; box-sizing: border-box;">
          <tr height="160">
            <td style="background-color: #0d2545; padding: 25px 40px; border-bottom: 8px solid #1a6fba; vertical-align: middle;">
              <table width="100%" border="0" cellspacing="0" cellpadding="0" style="table-layout: fixed;">
                <tr>
                  <td style="vertical-align: middle;">
                    <h1 style="margin: 0; font-family: 'Montserrat', sans-serif; font-size: 2.6rem; line-height: 1.1; text-transform: uppercase; letter-spacing: -1px; color: #ffffff; font-weight: 900;">Búsqueda de<br>Personas</h1>
                    <p style="font-size: 1.1rem; margin: 8px 0 0 0; font-weight: 700; text-transform: uppercase; color: #ffffff;">Dirección General Departamentales Norte</p>
                    <p style="font-size: 0.85rem; margin: 4px 0 0 0; font-weight: 400; text-transform: uppercase; color: #a4c8e1; letter-spacing: 0px;">Información aportada por las Unidades Regionales Departamentales Norte</p>
                  </td>
                  <td width="130" style="text-align: right; vertical-align: middle;">
                    <img src="https://subdirgralnorte-cmd.github.io/desaparecidos-norte/Diapositiva1-removebg-preview.png" style="height: 110px; width: auto; object-fit: contain;">
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          
          <tr>
            <td style="padding: 35px; vertical-align: top; background: #ffffff;">
              <table width="714" border="0" cellspacing="0" cellpadding="0" style="background: #f8f9fa; border: 2px solid #000000; border-radius: 8px; table-layout: fixed; height: 860px;">
                <tr>
                  <td style="padding: 25px; vertical-align: top;">
                    
                    <table width="664" border="0" cellspacing="0" cellpadding="0" style="table-layout: fixed;">
                      <tr>
                        <td width="280" style="vertical-align: top; padding-right: 25px; border-right: 1px solid #cccccc;">
                          <div style="width: 280px; height: 350px; border: 4px solid #000000; background: #eeeeee; display: flex; justify-content: center; align-items: center; overflow: hidden;">
                            <img src="${formatDriveLink(r.foto)}" style="max-width: 100%; max-height: 100%; object-fit: contain;" onerror="this.src='https://via.placeholder.com/280x350?text=SIN+IMAGEN'">
                          </div>
                          
                          <div style="margin-top: 25px; font-size: 1.05rem; font-weight: bold; color: #c0392b; text-transform: uppercase; text-align: center; border: 2px dashed #c0392b; padding: 15px; background: #ffffff; line-height: 1.4;">
                            INFORMAR A:<br>
                            <span style="color: #000000; font-weight: bold;">${r.contacto || 'Dependencia Policial'}</span><br><br>
                            TEL: <span style="color: #000000; font-weight: bold;">${r.telefono || '-'} / 911</span>
                          </div>
                        </td>
                        
                        <td width="384" style="vertical-align: top; padding-left: 25px;">
                          <div style="background: #0d2545; color: #ffffff; padding: 10px; text-align: center; font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; border-radius: 4px; font-family: 'Montserrat', sans-serif;">
                            Datos de la Persona
                          </div>
                          
                          <div style="font-size: 1.1rem; margin-bottom: 12px; text-transform: uppercase; line-height: 1.3;">
                            <b>NOMBRE:</b> <span style="color: #0d2545; font-size: 1.5rem; font-weight: 900; font-family: 'Montserrat', sans-serif; display: block; margin-top: 3px;">${r.nombre}</span>
                          </div>
                          
                          <div style="font-size: 1.1rem; margin-bottom: 12px; text-transform: uppercase;">
                            <b>EDAD:</b> <span style="font-weight: normal; color: #333333;">${r.edad} AÑOS</span>
                          </div>
                          
                          <div style="border-top: 1px solid #cccccc; margin: 15px 0;"></div>
                          
                          <div style="font-size: 1.1rem; margin-bottom: 12px; text-transform: uppercase; line-height: 1.3;">
                            <b>DESAPARECIDO EN:</b> <span style="font-weight: normal; color: #333333;">${limpiarTexto(r.localidad)}</span>
                          </div>
                          
                          <div style="font-size: 1.1rem; margin-bottom: 12px; text-transform: uppercase;">
                            <b>FECHA:</b> <span style="font-weight: normal; color: #333333;">${limpiarTexto(r.fecha)}</span> &nbsp;|&nbsp; <b>HORA:</b> <span style="font-weight: normal; color: #333333;">${limpiarTexto(r.hora)}</span>
                          </div>
                          
                          <div style="border-top: 1px solid #cccccc; margin: 15px 0;"></div>
                          
                          <div style="font-size: 1rem; margin-bottom: 6px; text-transform: uppercase; color: #1a6fba; font-weight: bold;">
                            DESCRIPCIÓN / VESTIMENTA:
                          </div>
                          <div style="font-size: 0.95rem; text-align: justify; line-height: 1.4; margin-bottom: 20px; background: #ffffff; padding: 12px; border: 1px solid #dddddd; border-radius: 4px; min-height: 90px; color: #333333; word-wrap: break-word;">
                            ${r.descripcion || 'Sin datos'}
                          </div>
                          
                          <div style="font-size: 1rem; margin-bottom: 6px; text-transform: uppercase; color: #1a6fba; font-weight: bold;">
                            RESEÑA DEL HECHO:
                          </div>
                          <div style="font-size: 0.95rem; text-align: justify; line-height: 1.4; background: #ffffff; padding: 12px; border: 1px solid #dddddd; border-radius: 4px; min-height: 110px; color: #333333; word-wrap: break-word;">
                            ${r.resena || 'Sin reseña'}
                          </div>
                        </td>
                      </tr>
                    </table>
                    
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          
          <tr height="40">
            <td style="background-color: #0d2545; border-top: 8px solid #1a6fba;"></td>
          </tr>
        </table>
      `;

      document.body.appendChild(tempDiv);

      const nombreArchivo = r.nombre ? r.nombre.replace(/ /g, '_') : 'Busqueda';
      const molde = document.getElementById('molde-impresion');

      html2pdf().set({
        margin:       0,
        filename:     `Alerta_${nombreArchivo}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { 
          scale: 2, 
          useCORS: true, 
          width: 794, 
          height: 1123,
          windowWidth: 794,
          windowHeight: 1123
        },
        jsPDF:        { unit: 'px', format: [794, 1123], orientation: 'portrait' }
      }).from(molde).save().then(() => {
        document.body.removeChild(tempDiv);
        document.getElementById('status-txt').innerText = statusOriginal;
      }).catch(err => {
        console.error(err);
        document.getElementById('status-txt').innerText = 'Error al procesar la imagen.';
      });
    }

    window.onload = cargarDatos;
    setInterval(cargarDatos, 10000); 
  </script>
</body>
</html>

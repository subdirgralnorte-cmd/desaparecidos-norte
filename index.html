<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Desaparecidos – Dirección General Departamentales Norte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --azul-profundo: #0d2545;
      --azul-medio:    #163a6e;
      --azul-acento:   #1a6fba;
      --celeste-suave: #e8f0fa;
      --blanco:        #ffffff;
      --gris-fondo:    #f2f4f8;
      --gris-borde:    #d0d8e8;
      --rojo-alerta:   #c0392b;
      --texto-oscuro:  #1a1f2e;
      --texto-medio:   #3d4a60;
      --texto-suave:   #6b7896;
      --sombra-suave:  0 2px 12px rgba(13,37,69,0.06);
      --sombra-card:   0 4px 20px rgba(13,37,69,0.12);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: var(--gris-fondo); color: var(--texto-oscuro); font-family: 'DM Sans', sans-serif; line-height: 1.5; padding-bottom: 50px; }
    header { background: var(--azul-profundo); color: var(--blanco); padding: 40px 20px; text-align: center; border-bottom: 4px solid var(--azul-acento); margin-bottom: 40px; }
    .header-content { max-width: 900px; margin: 0 auto; }
    .header-content h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px; letter-spacing: -0.5px; }
    .header-content p { font-weight: 300; opacity: 0.9; font-size: 1.1rem; }
    .status-bar { max-width: 1200px; margin: -20px auto 30px; background: var(--blanco); padding: 12px 25px; border-radius: 50px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--sombra-suave); border: 1px solid var(--gris-borde); }
    .status-dot { height: 10px; width: 10px; background: #27ae60; border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity:1; } 50% { opacity:0.4; } 100% { opacity:1; } }
    #status-txt { font-size: 0.85rem; color: var(--texto-medio); font-weight: 500; }
    .contenedor { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; padding: 0 20px; }
    .ficha { background: var(--blanco); border-radius: 16px; overflow: hidden; box-shadow: var(--sombra-suave); border: 1px solid var(--gris-borde); transition: transform 0.3s ease, box-shadow 0.3s ease; display: flex; flex-direction: column; }
    .ficha:hover { transform: translateY(-5px); box-shadow: var(--sombra-card); }
    .foto-wrapper { position: relative; width: 100%; height: 380px; background: #e0e6ed; overflow: hidden; }
    .foto-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
    .ficha:hover img { transform: scale(1.05); }
    .alerta-vigente { position: absolute; top: 15px; left: 15px; background: var(--rojo-alerta); color: white; padding: 5px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .ficha-info { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
    .ficha-header { margin-bottom: 15px; }
    .nombre { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--azul-profundo); margin-bottom: 4px; line-height: 1.2; }
    .edad-tag { display: inline-block; background: var(--celeste-suave); color: var(--azul-medio); font-size: 0.8rem; font-weight: 600; padding: 2px 10px; border-radius: 20px; }
    .ficha-desc { font-size: 0.9rem; color: var(--texto-medio); margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; flex-grow: 1; }
    .et-desc { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--texto-suave); font-weight: 700; margin-bottom: 5px; letter-spacing: 0.5px; }
    .sin-resultados { text-align: center; padding: 100px 20px; grid-column: 1 / -1; }
    .loader { text-align: center; padding: 50px; font-weight: 500; color: var(--azul-medio); }
    @media (max-width: 600px) { .header-content h1 { font-size: 1.8rem; } .status-bar { flex-direction: column; gap: 10px; border-radius: 15px; text-align: center; } }
  </style>
</head>
<body>

  <header>
    <div class="header-content">
      <h1>Búsqueda de Personas</h1>
      <p>Dirección General Departamentales Norte · Policía de Córdoba</p>
    </div>
  </header>

  <div class="status-bar">
    <div>
      <span class="status-dot"></span>
      <span id="status-txt">Iniciando sistema de búsqueda...</span>
    </div>
  </div>

  <div id="estado-carga" class="loader">Consultando base de datos oficial...</div>
  <div id="sin-resultados" class="sin-resultados" style="display:none;">
    <h3>No se registran alertas vigentes en este momento.</h3>
  </div>

  <main id="contenedor-fichas" class="contenedor"></main>

  <script>
    const DATA_URL = 'data.json';

    // FUNCIÓN CLAVE: Convierte links de Drive en imágenes visibles
    function corregirLinkDrive(url) {
        if (!url || url.trim() === "") return 'https://via.placeholder.com/400x500?text=Sin+Imagen+Disponible';
        if (url.includes('drive.google.com')) {
            let id = "";
            if (url.includes('id=')) {
                id = url.split('id=')[1].split('&')[0];
            } else {
                id = url.split('/d/')[1].split('/')[0];
            }
            return `https://lh3.googleusercontent.com/d/${id}`;
        }
        return url;
    }

    function esc(t) {
      if(!t) return "";
      return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function crearFicha(r) {
      // Usamos el transformador de links aquí
      const fotoFinal = corregirLinkDrive(r.foto);

      return `
      <article class="ficha">
        <div class="foto-wrapper">
          <div class="alerta-vigente">Búsqueda Vigente</div>
          <img src="${fotoFinal}" alt="Persona buscada" loading="lazy" onerror="this.src='https://via.placeholder.com/400x500?text=Error+al+cargar+foto'">
        </div>
        <div class="ficha-info">
          <div class="ficha-header">
            <h2 class="nombre">${esc(r.nombre)}</h2>
            <span class="edad-tag">${esc(r.edad || '—')} años</span>
          </div>
          <div class="ficha-desc">
            <span class="et-desc">Descripción y Último Paradero</span>
            ${esc(r.descripcion || 'Sin descripción adicional')}
          </div>
        </div>
      </article>`;
    }

    async function cargar() {
      try {
        const resp = await fetch(DATA_URL + '?t=' + Date.now());
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const dataRaw = await resp.json();

        // Si data.json viene como objeto con propiedad 'registros'
        let registros = Array.isArray(dataRaw) ? dataRaw : (dataRaw.registros || []);

        // FILTRO DE SEGURIDAD: Solo mostrar los que NO digan "HALLADO"
        // (Asegúrate que en tu Excel la columna se llame "estado")
        const vigentes = registros.filter(r => {
            const estado = (r.estado || "").toUpperCase();
            return estado !== "HALLADO";
        });

        document.getElementById('estado-carga').style.display = 'none';
        const contenedor = document.getElementById('contenedor-fichas');
        const sinResultados = document.getElementById('sin-resultados');

        if (vigentes.length === 0) {
          sinResultados.style.display = 'block';
          contenedor.innerHTML = '';
          document.getElementById('status-txt').textContent = 'No hay búsquedas vigentes.';
        } else {
          sinResultados.style.display = 'none';
          contenedor.innerHTML = vigentes.map(crearFicha).join('');
          
          const total = vigentes.length;
          document.getElementById('status-txt').textContent = 
            `${total} caso${total !== 1 ? 's' : ''} vigente${total !== 1 ? 's' : ''} en la zona norte`;
        }

      } catch (err) {
        console.error(err);
        document.getElementById('status-txt').textContent = '⚠️ Error al conectar con la base de datos.';
        document.getElementById('estado-carga').textContent = 'Error de conexión.';
      }
    }

    window.onload = cargar;
  </script>
</body>
</html>

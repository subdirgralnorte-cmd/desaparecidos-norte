<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Desaparecidos – Dirección General Departamentales Norte</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --azul-profundo: #0d2545; --azul-medio: #163a6e; --azul-acento: #1a6fba;
      --celeste-suave: #e8f0fa; --blanco: #ffffff; --gris-fondo: #f2f4f8;
      --gris-borde: #d0d8e8; --rojo-alerta: #c0392b; --texto-oscuro: #1a1f2e;
      --texto-medio: #3d4a60; --texto-suave: #6b7896;
      --sombra-suave: 0 2px 12px rgba(13,37,69,.10);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: var(--gris-fondo); color: var(--texto-oscuro); font-family: 'DM Sans', sans-serif; }
    header { background: var(--azul-profundo); color: var(--blanco); padding: 30px 20px; text-align: center; border-bottom: 4px solid var(--azul-acento); }
    .escudo { height: 80px; margin-bottom: 15px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
    header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; }
    .status-bar { max-width: 1100px; margin: -20px auto 20px; background: var(--blanco); padding: 15px 25px; border-radius: 10px; display: flex; align-items: center; box-shadow: var(--sombra-suave); border: 1px solid var(--gris-borde); position: relative; z-index: 10; }
    .status-dot { height: 10px; width: 10px; background: #27ae60; border-radius: 50%; display: inline-block; margin-right: 8px; }
    .contenedor { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding: 20px; }
    .ficha { background: var(--blanco); border-radius: 12px; overflow: hidden; box-shadow: var(--sombra-suave); border: 1px solid var(--gris-borde); display: flex; flex-direction: column; transition: 0.3s; }
    .ficha:hover { transform: translateY(-5px); }
    .foto-wrapper { width: 100%; height: 350px; background: #ddd; position: relative; }
    .foto-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    .tag-alerta { position: absolute; top: 15px; left: 15px; background: var(--rojo-alerta); color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
    .ficha-info { padding: 20px; flex-grow: 1; }
    .nombre { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--azul-profundo); margin-bottom: 10px; }
    .dato { font-size: 0.85rem; margin-bottom: 5px; color: var(--texto-medio); }
    .dato b { color: var(--azul-medio); }
    .loader { text-align: center; padding: 100px; font-size: 1.2rem; color: var(--azul-medio); }
  </style>
</head>
<body>
  <header>
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e3/Escudo_de_la_Polic%C3%ADa_de_la_Provincia_de_C%C3%B3rdoba.png" alt="Escudo Policía" class="escudo">
    <h1>Búsqueda de Personas</h1>
    <p>Dirección General Departamentales Norte · Policía de Córdoba</p>
  </header>

  <div class="status-bar">
    <div><span class="status-dot"></span> <span id="status-txt">Sincronizando con base de datos oficial...</span></div>
  </div>

  <main id="contenedor-fichas" class="contenedor">
    <div class="loader">Cargando registros...</div>
  </main>

  <script>
    // Transforma links de Drive para que se vean en la web
    function transformarFoto(url) {
      if (!url) return 'https://via.placeholder.com/400x500?text=Sin+Foto';
      const id = url.match(/(?:id=|d\/)([a-zA-Z0-9_-]+)/);
      return id ? `https://lh3.googleusercontent.com/d/${id[1]}` : url;
    }

    async function cargar() {
      try {
        const resp = await fetch('data.json?v=' + Date.now());
        const data = await resp.json();
        const contenedor = document.getElementById('contenedor-fichas');
        const lista = data.registros || [];

        if (lista.length === 0) {
          contenedor.innerHTML = '<div class="loader">No hay alertas vigentes en la hoja WebData.</div>';
          document.getElementById('status-txt').innerText = 'Base de datos vacía';
          return;
        }

        contenedor.innerHTML = lista.map(r => `
          <article class="ficha">
            <div class="foto-wrapper">
              <div class="tag-alerta">Búsqueda Vigente</div>
              <img src="${transformarFoto(r.foto)}" onerror="this.src='https://via.placeholder.com/400x500?text=Error+en+Imagen'">
            </div>
            <div class="ficha-info">
              <h2 class="nombre">${r.nombre || 'Sin Nombre'}</h2>
              <div class="dato"><b>Edad:</b> ${r.edad || '-'} años</div>
              <div class="dato"><b>Localidad:</b> ${r.localidad || '-'}</div>
              <div class="dato"><b>Visto por última vez:</b> ${r.fecha || '-'}</div>
              <div class="dato" style="margin-top:10px; font-style:italic;">"${r.descripcion || ''}"</div>
            </div>
          </article>
        `).join('');

        document.getElementById('status-txt').innerText = `${data.total} registros cargados desde WebData`;
      } catch (e) {
        document.getElementById('contenedor-fichas').innerHTML = '<div class="loader">Error al leer data.json</div>';
      }
    }
    window.onload = cargar;
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Búsqueda de Personas - Dirección General Departamentales Norte</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      --azul-policia: #0d2545; --azul-acento: #1a6fba; --gris-claro: #f8f9fa;
    }
    body { font-family: 'Roboto', sans-serif; background-color: #ffffff; margin: 0; padding: 0; color: #333; }
    header { background-color: var(--azul-policia); color: white; padding: 50px 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--azul-acento); }
    .header-left h1 { margin: 0; font-family: 'Montserrat', sans-serif; font-size: 5.5rem; line-height: 0.9; text-transform: uppercase; letter-spacing: -3px; }
    .header-left p { font-size: 1.8rem; margin-top: 15px; font-weight: 400; text-transform: uppercase; margin-bottom: 0; }
    .escudo-header { height: 280px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
    .status-bar { text-align: center; padding: 10px; background: #f1f1f1; font-size: 0.9rem; color: #555; border-bottom: 1px solid #ddd; }
    .contenedor { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 40px; min-height: 60vh; }
    .ficha { display: flex; background: var(--gris-claro); border: 1px solid #ddd; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
    .col-izquierda { width: 320px; min-width: 320px; padding: 20px; background: #fff; border-right: 2px solid #000; display: flex; flex-direction: column; align-items: center; }
    .foto-marco { width: 280px; height: 350px; border: 4px solid #000; background: #eee; overflow: hidden; }
    .foto-marco img { width: 100%; height: 100%; object-fit: cover; }
    .contacto-pie { margin-top: 15px; font-size: 0.8rem; font-weight: bold; color: #c0392b; text-align: center; text-transform: uppercase; }
    .col-derecha { flex-grow: 1; padding: 30px; display: flex; flex-direction: column; justify-content: center; }
    .info-linea { font-size: 1.1rem; margin-bottom: 10px; text-transform: uppercase; }
    .info-linea b { color: var(--azul-policia); }
    .btn-pdf { background-color: var(--azul-policia); color: white; border: none; padding: 12px 20px; font-size: 1rem; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 20px; align-self: flex-start; transition: background 0.3s; display: flex; align-items: center; gap: 8px; }
    .btn-pdf:hover { background-color: var(--azul-acento); }
    footer { background-color: var(--azul-policia); height: 80px; margin-top: 60px; border-top: 8px solid var(--azul-acento); width: 100%; }
    
    @media (max-width: 900px) {
      header { flex-direction: column; text-align: center; padding: 30px 20px; }
      .header-left h1 { font-size: 3rem; }
      .escudo-header { height: 180px; margin-top: 20px; }
      .ficha { flex-direction: column; }
      .col-izquierda { width: 100%; min-width: 100%; border-right: none; border-bottom: 2px solid #000; }
    }
  </style>
</head>
<body>

  <header id="cabecera-institucional">
    <div class="header-left">
      <h1>Búsqueda de<br>Personas</h1>
      <p>Dirección General Departamentales Norte</p>
    </div>
    <img src="Diapositiva1-removebg-preview.png" alt="Escudo Policía" class="escudo-header">
  </header>

  <div class="status-bar" id="status-txt">Iniciando sistema...</div>

  <main id="contenedor-fichas" class="contenedor">
    <div style="text-align:center; padding:50px; font-size: 1.2rem;">Cargando registros oficiales...</div>
  </main>

  <footer id="pie-institucional"></footer>

  <script>
    let datosGlobales = [];

    // Usamos el formato lh3 de Google para asegurar que la imagen funcione en el PDF sin bloqueos
    function formatDriveLink(url) {
      if (!url) return '';
      const match = url.match(/(?:id=|d\/)([a-zA-Z0-9_-]+)/);
      return match ? `https://lh3.googleusercontent.com/d/${match[1]}` : url;
    }

    async function cargar() {
      try {
        const resp = await fetch('data.json?nocache=' + new Date().getTime());
        const data = await resp.json();
        
        const contenedor = document.getElementById('contenedor-fichas');
        datosGlobales = data.registros || [];

        const horaConsulta = new Date().toLocaleTimeString('es-AR', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        document.getElementById('status-txt').innerText = `Última consulta: ${horaConsulta} - ${datosGlobales.length} registros (Recordá que la web demora 6 min en reflejar cambios del Excel)`;

        if (datosGlobales.length === 0) {
          contenedor.innerHTML = '<h2 style="text-align:center; color:#c0392b;">No hay alertas vigentes en este momento.</h2>';
          return;
        }

        let htmlFichas = '';
        datosGlobales.forEach((r, index) => {
          htmlFichas += `
            <article class="ficha">
              <div class="col-izquierda">
                <div class="foto-marco">
                  <img src="${formatDriveLink(r.foto)}" crossorigin="anonymous" onerror="this.src='https://via.placeholder.com/280x350?text=SIN+IMAGEN'">
                </div>
                <div class="contacto-pie">
                  CUALQUIER INFORMACIÓN A:<br>${r.contacto || 'POLICÍA LOCAL'}<br>
                  AL TEL: ${r.telefono || '101 / 911'}
                </div>
              </div>
              <div class="col-derecha">
                <div class="info-linea"><b>DESAPARECIDO EN:</b> ${r.localidad || '-'}</div>
                <div class="info-linea"><b>EN FECHA:</b> ${r.fecha || '-'}</div>
                <div class="info-linea"><b>A LAS:</b> ${r.hora || '-'}</div>
                <br>
                <div class="info-linea"><b>NOMBRE COMPLETO:</b> ${r.nombre || '-'}</div>
                <div class="info-linea"><b>EDAD:</b> ${r.edad || '-'} AÑOS</div>
                <br>
                <div class="info-linea"><b>DESCRIPCIÓN:</b></div>
                <div style="font-size: 1rem; text-align: justify; line-height: 1.4; margin-bottom: 10px;">
                  ${r.descripcion || 'Sin descripción adicional.'}
                </div>
                <button class="btn-pdf" onclick="descargarPDF(${index})">📄 Descargar PDF</button>
              </div>
            </article>
          `;
        });
        contenedor.innerHTML = htmlFichas;

      } catch (e) {
        document.getElementById('status-txt').innerText = 'Conectando con la base de datos...';
      }
    }

    // El nuevo motor de PDF que NO sale en blanco
    function descargarPDF(index) {
      const r = datosGlobales[index];
      const statusOriginal = document.getElementById('status-txt').innerText;
      document.getElementById('status-txt').innerText = '⏳ Generando PDF... Por favor espere.';

      const fotoUrl = formatDriveLink(r.foto);
      
      // Creamos la estructura A4 exacta pero en formato texto (Soluciona el error en blanco)
      const htmlParaPDF = `
        <div style="width: 1000px; min-height: 1414px; position: relative; background: #ffffff; font-family: 'Roboto', sans-serif; color: #333;">
          
          <div style="background-color: #0d2545; color: white; padding: 40px 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid #1a6fba;">
            <div>
              <h1 style="margin: 0; font-family: 'Montserrat', sans-serif; font-size: 4rem; line-height: 1; text-transform: uppercase; letter-spacing: -2px;">Búsqueda de<br>Personas</h1>
              <p style="font-size: 1.5rem; margin-top: 15px; font-weight: 400; text-transform: uppercase;">Dirección General Departamentales Norte</p>
            </div>
            <img src="Diapositiva1-removebg-preview.png" style="height: 200px;">
          </div>
          
          <div style="padding: 60px;">
            <div style="display: flex; background: #f8f9fa; border: 2px solid #000; border-radius: 4px;">
              <div style="width: 320px; min-width: 320px; padding: 20px; background: #fff; border-right: 2px solid #000; text-align: center;">
                <div style="width: 280px; height: 350px; border: 4px solid #000; background: #eee; overflow: hidden; margin: 0 auto;">
                  <img src="${fotoUrl}" style="width: 100%; height: 100%; object-fit: cover;" crossorigin="anonymous">
                </div>
                <div style="margin-top: 20px; font-size: 0.9rem; font-weight: bold; color: #c0392b; text-transform: uppercase;">
                  CUALQUIER INFORMACIÓN A:<br>${r.contacto || 'POLICÍA LOCAL'}<br><br>AL TEL: ${r.telefono || '101 / 911'}
                </div>
              </div>
              
              <div style="flex-grow: 1; padding: 30px; display: flex; flex-direction: column; justify-content: center;">
                <div style="font-size: 1.2rem; margin-bottom: 15px; text-transform: uppercase;"><b>DESAPARECIDO EN:</b> ${r.localidad || '-'}</div>
                <div style="font-size: 1.2rem; margin-bottom: 15px; text-transform: uppercase;"><b>EN FECHA:</b> ${r.fecha || '-'}</div>
                <div style="font-size: 1.2rem; margin-bottom: 15px; text-transform: uppercase;"><b>A LAS:</b> ${r.hora || '-'}</div>
                <br>
                <div style="font-size: 1.2rem; margin-bottom: 15px; text-transform: uppercase;"><b>NOMBRE COMPLETO:</b> ${r.nombre || '-'}</div>
                <div style="font-size: 1.2rem; margin-bottom: 15px; text-transform: uppercase;"><b>EDAD:</b> ${r.edad || '-'} AÑOS</div>
                <br>
                <div style="font-size: 1.2rem; margin-bottom: 10px; text-transform: uppercase;"><b>DESCRIPCIÓN:</b></div>
                <div style="font-size: 1.1rem; text-align: justify; line-height: 1.5;">
                  ${r.descripcion || 'Sin descripción adicional.'}
                </div>
              </div>
            </div>
          </div>
          
          <div style="background-color: #0d2545; height: 80px; border-top: 8px solid #1a6fba; position: absolute; bottom: 0; width: 100%;"></div>
        </div>
      `;

      const nombreArchivo = r.nombre ? r.nombre.replace(/ /g, '_') : 'Busqueda';
      const opt = {
        margin:       0,
        filename:     `Alerta_${nombreArchivo}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      html2pdf().set(opt).from(htmlParaPDF).save().then(() => {
        document.getElementById('status-txt').innerText = statusOriginal;
      });
    }

    window.onload = () => {
      cargar();
      setInterval(cargar, 60000); // Consulta real cada 1 minuto (depende del delay de GitHub)
    };
  </script>
</body>
</html>

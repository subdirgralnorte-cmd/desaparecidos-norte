<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Búsqueda de Personas - Dirección General Departamentales Norte</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root { --azul-policia: #0d2545; --azul-acento: #1a6fba; --gris-claro: #f8f9fa; }
    body { font-family: 'Roboto', sans-serif; background-color: #ffffff; margin: 0; padding: 0; color: #333; }
    header { background-color: var(--azul-policia); color: white; padding: 50px 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--azul-acento); }
    .header-left h1 { margin: 0; font-family: 'Montserrat', sans-serif; font-size: 5.5rem; line-height: 0.9; text-transform: uppercase; letter-spacing: -3px; }
    .header-left p { font-size: 1.8rem; margin-top: 15px; font-weight: 400; text-transform: uppercase; margin-bottom: 0; }
    .escudo-header { height: 280px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
    .status-bar { text-align: center; padding: 10px; background: #f1f1f1; font-size: 0.9rem; color: #555; border-bottom: 1px solid #ddd; }
    .contenedor { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 40px; min-height: 60vh; }
    .ficha { display: flex; background: var(--gris-claro); border: 1px solid #ddd; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
    .col-izquierda { width: 320px; min-width: 320px; padding: 20px; background: #fff; border-right: 2px solid #000; display: flex; flex-direction: column; align-items: center; }
    .foto-marco { width: 280px; height: 350px; border: 4px solid #000; background: #eee; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    .foto-marco img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .contacto-pie { margin-top: 15px; font-size: 0.8rem; font-weight: bold; color: #c0392b; text-align: center; text-transform: uppercase; }
    .col-derecha { flex-grow: 1; padding: 30px; display: flex; flex-direction: column; justify-content: center; }
    .info-linea { font-size: 1.1rem; margin-bottom: 10px; text-transform: uppercase; }
    .info-linea b { color: var(--azul-policia); }

    .btn-pdf {
      background-color: var(--azul-policia); color: white; border: none;
      padding: 12px 20px; font-size: 1rem; font-weight: bold; border-radius: 4px;
      cursor: pointer; margin-top: 20px; align-self: flex-start;
      display: flex; align-items: center; gap: 8px; transition: background 0.3s, opacity 0.3s;
    }
    .btn-pdf:hover:not(:disabled) { background-color: var(--azul-acento); }
    .btn-pdf:disabled { opacity: 0.5; cursor: not-allowed; }

    footer { background-color: var(--azul-policia); height: 80px; margin-top: 60px; border-top: 8px solid var(--azul-acento); width: 100%; }

    @media (max-width: 900px) {
      header { flex-direction: column; text-align: center; padding: 30px 20px; }
      .header-left h1 { font-size: 3rem; }
      .escudo-header { height: 180px; margin-top: 20px; }
      .ficha { flex-direction: column; }
      .col-izquierda { width: 100%; min-width: 100%; border-right: none; border-bottom: 2px solid #000; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <h1>Búsqueda de<br>Personas</h1>
      <p>Dirección General Departamentales Norte</p>
    </div>
    <img src="Diapositiva1-removebg-preview.png" alt="Escudo Policía" class="escudo-header">
  </header>

  <div class="status-bar" id="status-txt">Conectando con base de datos policial...</div>

  <main id="contenedor-fichas" class="contenedor">
    <div style="text-align:center; padding:50px; font-size:1.2rem;">Cargando registros oficiales...</div>
  </main>

  <footer></footer>

  <script>
    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbw8m7K4ogyIhubFaTUUG5gn-lcb75NJlM708VM1yoHCuiOmhpF4WfHbvaKOE4ZmRNBl/exec';
    let datosGlobales = [];

    // URL de miniatura de Drive
    function formatDriveLink(url) {
      if (!url) return '';
      const match = url.match(/(?:id=|d\/)([a-zA-Z0-9_-]+)/);
      return match ? `https://drive.google.com/thumbnail?id=${match[1]}&sz=w800` : url;
    }

    function limpiarTexto(texto) {
      if (!texto) return '-';
      if (texto.includes('T') && texto.includes('1899')) {
        return new Date(texto).toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
      }
      if (texto.includes('T') && texto.length > 15) {
        const p = texto.split('T')[0].split('-');
        return `${p[2]}/${p[1]}/${p[0]}`;
      }
      return texto;
    }

    // Convierte una URL de imagen a base64 usando un canvas auxiliar.
    // Si la imagen no carga (CORS bloqueado), devuelve null.
    function urlABase64(src) {
      return new Promise((resolve) => {
        if (!src) { resolve(null); return; }
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          try {
            const c = document.createElement('canvas');
            c.width = img.naturalWidth;
            c.height = img.naturalHeight;
            c.getContext('2d').drawImage(img, 0, 0);
            resolve(c.toDataURL('image/jpeg', 0.95));
          } catch(e) { resolve(null); }
        };
        img.onerror = () => resolve(null);
        // Forzar recarga sin caché para que crossOrigin funcione
        img.src = src + (src.includes('?') ? '&' : '?') + '_cb=' + Date.now();
      });
    }

    async function cargarDatos() {
      try {
        const res = await fetch(URL_SCRIPT + '?nocache=' + Date.now());
        datosGlobales = await res.json();
        renderizarFichas();
        const ahora = new Date().toLocaleTimeString('es-AR');
        document.getElementById('status-txt').innerText =
          `En vivo vía App Script: ${ahora} — ${datosGlobales.length} registros`;
      } catch(e) {
        document.getElementById('status-txt').innerText = 'Error de conexión con el Script en vivo.';
      }
    }

    function renderizarFichas() {
      const contenedor = document.getElementById('contenedor-fichas');
      if (!datosGlobales.length) {
        contenedor.innerHTML = '<h2 style="text-align:center;color:#c0392b;">No hay alertas vigentes.</h2>';
        return;
      }
      contenedor.innerHTML = datosGlobales.map((r, i) => `
        <article class="ficha">
          <div class="col-izquierda">
            <div class="foto-marco">
              <img src="${formatDriveLink(r.foto)}"
                   onerror="this.src='https://placehold.co/280x350/eeeeee/999999?text=SIN+IMAGEN'">
            </div>
            <div class="contacto-pie">
              INFORMAR A:<br>${r.contacto || r.dependencia || 'Dependencia Policial'}<br><br>
              TEL: ${r.telefono || '-'} / 911
            </div>
          </div>
          <div class="col-derecha">
            <div class="info-linea"><b>DESAPARECIDO EN:</b> ${limpiarTexto(r.localidad)}</div>
            <div class="info-linea"><b>FECHA:</b> ${limpiarTexto(r.fecha)} | <b>HORA:</b> ${limpiarTexto(r.hora)}</div>
            <br>
            <div class="info-linea"><b>NOMBRE:</b> ${r.nombre}</div>
            <div class="info-linea"><b>EDAD:</b> ${r.edad} AÑOS</div>
            <br>
            <div class="info-linea"><b>DESCRIPCIÓN / VESTIMENTA:</b></div>
            <div style="font-size:0.95rem;line-height:1.6;text-align:justify;margin-bottom:10px;">${r.descripcion || 'Sin datos'}</div>
            <div class="info-linea"><b>RESEÑA DEL HECHO:</b></div>
            <div style="font-size:0.95rem;line-height:1.6;text-align:justify;">${r.resena || 'Sin reseña'}</div>
            <button class="btn-pdf" id="btn-${i}" onclick="descargarPDF(${i})">📄 Descargar PDF</button>
          </div>
        </article>
      `).join('');
    }

    // =========================================================================
    // MOTOR PDF: foto pre-convertida a base64 → molde HTML → html2pdf
    // =========================================================================
    async function descargarPDF(index) {
      const r = datosGlobales[index];
      if (!r) { alert('Error: registro no encontrado.'); return; }

      // ── Bloquear botón ────────────────────────────────────────────────────
      const boton = document.getElementById(`btn-${index}`);
      boton.disabled = true;
      boton.textContent = '⏳ Preparando PDF...';

      const statusTxt = document.getElementById('status-txt');
      const statusOriginal = statusTxt.innerText;
      statusTxt.innerText = '⏳ Convirtiendo imagen y generando PDF — por favor espere...';

      try {
        // ── 1. Convertir foto a base64 (resuelve CORS en el canvas) ──────────
        const fotoSrc = formatDriveLink(r.foto);
        const fotoB64 = await urlABase64(fotoSrc);
        const fotoAttr = fotoB64
          ? `src="${fotoB64}"`
          : `src="https://placehold.co/320x400/eeeeee/999999?text=FOTO+NO+DISPONIBLE"`;

        // ── 2. Construir molde HTML de página A4 (794 × 1123 px) ─────────────
        //     Diseño de dos columnas en la sección de datos para dar aire
        const molde = document.createElement('div');
        molde.style.cssText = [
          'position:absolute', 'top:0', 'left:0', 'z-index:-9999',
          'width:794px', 'background:#fff', 'font-family:Roboto,sans-serif',
          'box-sizing:border-box', 'visibility:hidden'
        ].join(';');

        molde.innerHTML = `
          <!-- HEADER -->
          <div style="background:#0d2545;color:#fff;padding:28px 40px;
                      border-bottom:7px solid #1a6fba;
                      display:flex;justify-content:space-between;align-items:center;">
            <div>
              <div style="font-family:Montserrat,sans-serif;font-size:34px;
                          font-weight:900;text-transform:uppercase;line-height:1.1;">
                Búsqueda de Personas
              </div>
              <div style="font-size:15px;font-weight:700;text-transform:uppercase;
                          margin-top:8px;">
                Dirección General Departamentales Norte
              </div>
              <div style="font-size:11px;color:#a4c8e1;margin-top:4px;text-transform:uppercase;">
                Información aportada por las Unidades Regionales Departamentales Norte
              </div>
            </div>
            <img src="https://subdirgralnorte-cmd.github.io/desaparecidos-norte/Diapositiva1-removebg-preview.png"
                 style="height:100px;" crossorigin="anonymous">
          </div>

          <!-- CUERPO -->
          <div style="padding:32px 40px;">

            <!-- FOTO centrada -->
            <div style="text-align:center;margin-bottom:20px;">
              <div style="display:inline-block;width:300px;height:375px;
                          border:4px solid #000;background:#eee;overflow:hidden;
                          vertical-align:top;">
                <img ${fotoAttr}
                     style="width:300px;height:375px;object-fit:contain;display:block;">
              </div>
            </div>

            <!-- CONTACTO -->
            <div style="text-align:center;margin-bottom:22px;">
              <div style="display:inline-block;border:2px dashed #c0392b;
                          background:#fdf5f5;padding:14px 32px;border-radius:4px;">
                <div style="color:#c0392b;font-weight:700;font-size:13px;
                            text-transform:uppercase;letter-spacing:1px;">
                  INFORMAR A:
                </div>
                <div style="font-size:19px;font-weight:700;color:#000;margin:6px 0;">
                  ${r.contacto || r.dependencia || 'Dependencia Policial'}
                </div>
                <div style="font-size:13px;color:#c0392b;font-weight:700;">
                  TEL: <span style="color:#000;font-size:20px;font-weight:900;">
                    ${r.telefono || '-'} / 911
                  </span>
                </div>
              </div>
            </div>

            <!-- SEPARADOR -->
            <div style="border-top:4px solid #000;margin:0 0 22px 0;"></div>

            <!-- DATOS PRINCIPALES: grilla 2 col -->
            <table style="width:100%;border-collapse:collapse;margin-bottom:18px;font-size:14px;">
              <tr>
                <td style="width:50%;padding:5px 8px 5px 0;vertical-align:top;">
                  <span style="color:#0d2545;font-weight:700;text-transform:uppercase;">
                    Desaparecido en:
                  </span><br>
                  <span style="font-size:15px;text-transform:uppercase;">
                    ${limpiarTexto(r.localidad)}
                  </span>
                </td>
                <td style="width:25%;padding:5px 8px;vertical-align:top;">
                  <span style="color:#0d2545;font-weight:700;text-transform:uppercase;">
                    Fecha:
                  </span><br>
                  <span style="font-size:15px;">${limpiarTexto(r.fecha)}</span>
                </td>
                <td style="width:25%;padding:5px 0 5px 8px;vertical-align:top;">
                  <span style="color:#0d2545;font-weight:700;text-transform:uppercase;">
                    Hora:
                  </span><br>
                  <span style="font-size:15px;">${limpiarTexto(r.hora)}</span>
                </td>
              </tr>
            </table>

            <!-- NOMBRE grande -->
            <div style="background:#f0f4fa;border-left:6px solid #0d2545;
                        padding:12px 18px;margin-bottom:18px;border-radius:2px;">
              <div style="font-size:12px;font-weight:700;color:#0d2545;
                          text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">
                Nombre completo
              </div>
              <div style="font-family:Montserrat,sans-serif;font-size:26px;
                          font-weight:900;color:#0d2545;text-transform:uppercase;">
                ${r.nombre || '-'}
              </div>
              <div style="font-size:15px;font-weight:700;margin-top:6px;color:#333;">
                EDAD: ${r.edad || '-'} AÑOS
              </div>
            </div>

            <!-- DESCRIPCIÓN -->
            <div style="margin-bottom:16px;">
              <div style="font-size:12px;font-weight:700;color:#1a6fba;
                          text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;
                          border-bottom:2px solid #1a6fba;padding-bottom:3px;">
                Descripción / Vestimenta
              </div>
              <div style="font-size:13.5px;line-height:1.7;text-align:justify;
                          background:#f8f9fa;padding:12px 16px;border-left:4px solid #1a6fba;">
                ${r.descripcion || 'Sin datos'}
              </div>
            </div>

            <!-- RESEÑA -->
            <div style="margin-bottom:16px;">
              <div style="font-size:12px;font-weight:700;color:#1a6fba;
                          text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;
                          border-bottom:2px solid #1a6fba;padding-bottom:3px;">
                Reseña del hecho
              </div>
              <div style="font-size:13.5px;line-height:1.7;text-align:justify;
                          background:#f8f9fa;padding:12px 16px;border-left:4px solid #1a6fba;">
                ${r.resena || 'Sin reseña'}
              </div>
            </div>

          </div>

          <!-- PIE -->
          <div style="background:#0d2545;height:40px;border-top:6px solid #1a6fba;
                      margin-top:10px;"></div>
        `;

        document.body.appendChild(molde);

        // ── 3. Generar PDF ────────────────────────────────────────────────────
        const nombreArchivo = (r.nombre || 'Busqueda').replace(/\s+/g, '_');

        await html2pdf().set({
          margin:      0,
          filename:    `Alerta_${nombreArchivo}.pdf`,
          image:       { type: 'jpeg', quality: 0.98 },
          html2canvas: {
            scale:       2,
            useCORS:     true,
            allowTaint:  false,
            windowWidth: 794,
            logging:     false
          },
          jsPDF: { unit: 'px', format: [794, 1123], orientation: 'portrait' }
        }).from(molde).save();

        document.body.removeChild(molde);

      } catch(err) {
        console.error('Error generando PDF:', err);
        statusTxt.innerText = '⚠️ Error al generar el PDF. Intente nuevamente.';
      } finally {
        // ── Siempre restaurar el botón ────────────────────────────────────────
        boton.disabled = false;
        boton.innerHTML = '📄 Descargar PDF';
        statusTxt.innerText = statusOriginal;
      }
    }

    window.onload = cargarDatos;
    setInterval(cargarDatos, 10000);
  </script>
</body>
</html>

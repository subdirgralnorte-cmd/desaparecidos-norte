<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Búsqueda de Personas - Dirección General Departamentales Norte</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* DISEÑO WEB Y MÓVIL INTACTO */
    :root { --azul-policia: #0d2545; --azul-acento: #1a6fba; --gris-claro: #f8f9fa; }
    body { font-family: 'Roboto', sans-serif; background-color: #ffffff; margin: 0; padding: 0; color: #333; }
    header { background-color: var(--azul-policia); color: white; padding: 50px 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--azul-acento); }
    .header-left h1 { margin: 0; font-family: 'Montserrat', sans-serif; font-size: 5.5rem; line-height: 0.9; text-transform: uppercase; letter-spacing: -3px; }
    .header-left p { font-size: 1.8rem; margin-top: 15px; font-weight: 400; text-transform: uppercase; margin-bottom: 0; }
    .escudo-header { height: 280px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
    .status-bar { text-align: center; padding: 10px; background: #f1f1f1; font-size: 0.9rem; color: #555; border-bottom: 1px solid #ddd; }
    .contenedor { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 40px; min-height: 60vh; }
    .ficha { display: flex; background: var(--gris-claro); border: 1px solid #ddd; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
    .col-izquierda { width: 320px; min-width: 320px; padding: 20px; background: #fff; border-right: 2px solid #000; display: flex; flex-direction: column; align-items: center; }
    .foto-marco { width: 280px; height: 350px; border: 4px solid #000; background: #eee; overflow: hidden; }
    .foto-marco img { width: 100%; height: 100%; object-fit: cover; }
    .contacto-pie { margin-top: 15px; font-size: 0.8rem; font-weight: bold; color: #c0392b; text-align: center; text-transform: uppercase; }
    .col-derecha { flex-grow: 1; padding: 30px; display: flex; flex-direction: column; justify-content: center; }
    .info-linea { font-size: 1.1rem; margin-bottom: 10px; text-transform: uppercase; }
    .info-linea b { color: var(--azul-policia); }
    .btn-pdf { background-color: var(--azul-policia); color: white; border: none; padding: 12px 20px; font-size: 1rem; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 20px; align-self: flex-start; display: flex; align-items: center; gap: 8px; transition: background 0.3s; }
    .btn-pdf:hover { background-color: var(--azul-acento); }
    footer { background-color: var(--azul-policia); height: 80px; margin-top: 60px; border-top: 8px solid var(--azul-acento); width: 100%; }
    
    @media (max-width: 900px) {
      header { flex-direction: column; text-align: center; padding: 30px 20px; }
      .header-left h1 { font-size: 3rem; }
      .escudo-header { height: 180px; margin-top: 20px; }
      .ficha { flex-direction: column; }
      .col-izquierda { width: 100%; min-width: 100%; border-right: none; border-bottom: 2px solid #000; }
    }
  </style>
</head>
<body>

  <header id="cabecera-institucional">
    <div class="header-left">
      <h1>Búsqueda de<br>Personas</h1>
      <p>Dirección General Departamentales Norte</p>
    </div>
    <img src="Diapositiva1-removebg-preview.png" alt="Escudo Policía" class="escudo-header">
  </header>

  <div class="status-bar" id="status-txt">Conectando con base de datos policial...</div>

  <main id="contenedor-fichas" class="contenedor">
    <div style="text-align:center; padding:50px; font-size: 1.2rem;">Cargando registros oficiales...</div>
  </main>

  <footer id="pie-institucional"></footer>

  <script>
    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbw8m7K4ogyIhubFaTUUG5gn-lcb75NJlM708VM1yoHCuiOmhpF4WfHbvaKOE4ZmRNBl/exec';

    let datosGlobales = [];

    // Link arreglado para evitar bloqueos
    function formatDriveLink(url) {
      if (!url) return '';
      const match = url.match(/(?:id=|d\/)([a-zA-Z0-9_-]+)/);
      return match ? `https://lh3.googleusercontent.com/d/${match[1]}` : url;
    }

    function limpiarTexto(texto) {
      if (!texto) return '-';
      if (texto.includes('T') && texto.includes('1899')) {
        let d = new Date(texto);
        return d.toLocaleTimeString('es-AR', {hour: '2-digit', minute:'2-digit'});
      }
      if (texto.includes('T') && texto.length > 15) {
        let p = texto.split('T')[0].split('-');
        return `${p[2]}/${p[1]}/${p[0]}`;
      }
      return texto;
    }

    async function cargarDatos() {
      try {
        const res = await fetch(URL_SCRIPT + "?nocache=" + new Date().getTime());
        datosGlobales = await res.json();

        renderizarFichas();
        const ahora = new Date().toLocaleTimeString('es-AR');
        document.getElementById('status-txt').innerText = `En vivo vía App Script: ${ahora} - ${datosGlobales.length} registros`;
      } catch (e) {
        document.getElementById('status-txt').innerText = 'Error de conexión con el Script en vivo.';
      }
    }

    function renderizarFichas() {
      const contenedor = document.getElementById('contenedor-fichas');
      
      if (datosGlobales.length === 0) {
        contenedor.innerHTML = '<h2 style="text-align:center; color:#c0392b;">No hay alertas vigentes en este momento.</h2>';
        return;
      }

      contenedor.innerHTML = datosGlobales.map((r, i) => `
        <article class="ficha">
          <div class="col-izquierda">
            <div class="foto-marco">
              <img src="${formatDriveLink(r.foto)}" crossorigin="anonymous" onerror="this.src='https://via.placeholder.com/280x350?text=SIN+IMAGEN'">
            </div>
            <div class="contacto-pie">
              INFORMAR A:<br>${r.dependencia}<br><br>
              TEL: ${r.telefono} / 911
            </div>
          </div>
          <div class="col-derecha">
            <div class="info-linea"><b>DESAPARECIDO EN:</b> ${limpiarTexto(r.localidad)}</div>
            <div class="info-linea"><b>FECHA:</b> ${limpiarTexto(r.fecha)} | <b>HORA:</b> ${limpiarTexto(r.hora)}</div>
            <br>
            <div class="info-linea"><b>NOMBRE:</b> ${r.nombre}</div>
            <div class="info-linea"><b>EDAD:</b> ${r.edad} AÑOS</div>
            <br>
            <div class="info-linea"><b>DESCRIPCIÓN / VESTIMENTA:</b></div>
            <div style="font-size:0.95rem; line-height:1.4; text-align:justify; margin-bottom:10px;">${r.descripcion || 'Sin datos'}</div>
            <div class="info-linea"><b>RESEÑA DEL HECHO:</b></div>
            <div style="font-size:0.95rem; line-height:1.4; text-align:justify;">${r.resena || 'Sin reseña'}</div>
            
            <button class="btn-pdf" onclick="descargarPDF(${i})">📄 Descargar PDF</button>
          </div>
        </article>
      `).join('');
    }

    // NUEVO MOTOR PDF A4 HORIZONTAL EXACTO (1122px x 793px)
    function descargarPDF(index) {
      const r = datosGlobales[index];
      const statusOriginal = document.getElementById('status-txt').innerText;
      document.getElementById('status-txt').innerText = '⏳ Generando PDF A4... Por favor espere.';

      // 1. Crear el contenedor físico invisible
      const tempDiv = document.createElement('div');
      tempDiv.style.position = 'absolute';
      tempDiv.style.top = '-9999px';
      tempDiv.style.left = '0';
      
      // Armamos la hoja en la medida exacta de A4 Horizontal para que calce justo (1122x793)
      tempDiv.innerHTML = `
        <div id="molde-impresion" style="width: 1122px; height: 793px; position: relative; background: #ffffff; font-family: 'Roboto', sans-serif; box-sizing: border-box; overflow: hidden;">
          
          <div style="background-color: #0d2545; color: white; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid #1a6fba; height: 160px; box-sizing: border-box;">
            <div>
              <h1 style="margin: 0; font-family: 'Montserrat', sans-serif; font-size: 3.5rem; line-height: 1; text-transform: uppercase; letter-spacing: -2px;">Búsqueda de Personas</h1>
              <p style="font-size: 1.3rem; margin-top: 5px; font-weight: 400; text-transform: uppercase; margin-bottom: 0;">Dirección General Departamentales Norte</p>
            </div>
            <img src="https://subdirgralnorte-cmd.github.io/desaparecidos-norte/Diapositiva1-removebg-preview.png" style="height: 110px;" crossorigin="anonymous">
          </div>
          
          <div style="padding: 30px 50px; height: 583px; box-sizing: border-box;">
            <div style="display: flex; background: #f8f9fa; border: 2px solid #000; border-radius: 4px; height: 100%;">
              
              <div style="width: 320px; min-width: 320px; padding: 20px; background: #fff; border-right: 2px solid #000; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <div style="width: 260px; height: 320px; border: 4px solid #000; background: #eee; overflow: hidden;">
                  <img src="${formatDriveLink(r.foto)}" style="width: 100%; height: 100%; object-fit: cover;" crossorigin="anonymous">
                </div>
                <div style="margin-top: 15px; font-size: 1rem; font-weight: bold; color: #c0392b; text-transform: uppercase; text-align: center;">
                   INFORMAR A:<br>${r.dependencia}<br><br>TEL: ${r.telefono} / 911
                </div>
              </div>
              
              <div style="flex-grow: 1; padding: 30px; display: flex; flex-direction: column; justify-content: flex-start;">
                <div style="font-size: 1.2rem; margin-bottom: 10px; text-transform: uppercase;"><b>DESAPARECIDO EN:</b> ${limpiarTexto(r.localidad)}</div>
                <div style="font-size: 1.2rem; margin-bottom: 10px; text-transform: uppercase;"><b>FECHA:</b> ${limpiarTexto(r.fecha)} | <b>HORA:</b> ${limpiarTexto(r.hora)}</div>
                <br>
                <div style="font-size: 1.5rem; margin-bottom: 10px; text-transform: uppercase; color: #0d2545;"><b>NOMBRE:</b> ${r.nombre}</div>
                <div style="font-size: 1.2rem; margin-bottom: 10px; text-transform: uppercase;"><b>EDAD:</b> ${r.edad} AÑOS</div>
                <br>
                <div style="font-size: 1.1rem; margin-bottom: 5px; text-transform: uppercase;"><b>DESCRIPCIÓN / VESTIMENTA:</b></div>
                <div style="font-size: 1.1rem; text-align: justify; line-height: 1.3; margin-bottom: 15px; max-height: 100px; overflow: hidden;">${r.descripcion || 'Sin datos'}</div>
                <div style="font-size: 1.1rem; margin-bottom: 5px; text-transform: uppercase;"><b>RESEÑA DEL HECHO:</b></div>
                <div style="font-size: 1.1rem; text-align: justify; line-height: 1.3; max-height: 100px; overflow: hidden;">${r.resena || 'Sin reseña'}</div>
              </div>

            </div>
          </div>
          
          <div style="background-color: #0d2545; height: 50px; border-top: 8px solid #1a6fba; position: absolute; bottom: 0; width: 100%; box-sizing: border-box;"></div>
        </div>
      `;

      // 2. Lo conectamos al documento web
      document.body.appendChild(tempDiv);

      const nombreArchivo = r.nombre ? r.nombre.replace(/ /g, '_') : 'Busqueda';
      const molde = document.getElementById('molde-impresion');

      // 3. Imprimimos forzando a que la cámara capture solo ese recuadro de píxeles
      html2pdf().set({
        margin:       0,
        filename:     `Alerta_${nombreArchivo}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true, windowWidth: 1122, windowHeight: 793 },
        jsPDF:        { unit: 'px', format: [1122, 793], orientation: 'landscape' }
      }).from(molde).save().then(() => {
        // 4. Limpiamos la basura invisible
        document.body.removeChild(tempDiv);
        document.getElementById('status-txt').innerText = statusOriginal;
      });
    }

    window.onload = cargarDatos;
    setInterval(cargarDatos, 10000); 
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Búsqueda de Personas - Dirección General Departamentales Norte</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --azul-policia: #0d2545;
      --gris-claro: #f8f9fa;
      --borde-tarjeta: #dee2e6;
    }

    body { 
      font-family: 'Roboto', sans-serif; 
      background-color: #ffffff; 
      margin: 0; padding: 0; color: #333; 
    }

/* Cabecera Institucional */
    header { 
      background-color: var(--azul-policia); 
      color: white; 
      padding: 40px 20px; /* Aumenté el padding para que respire más el escudo grande */
      text-align: center; 
      border-bottom: 5px solid #1a6fba; 
    }
    .escudo { 
      height: 300px; /* Tamaño mucho más visible */
      margin-bottom: 15px; 
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); /* Le da más relieve */
    }

    /* Contenedor de Fichas (Apiladas verticalmente) */
    .contenedor { 
      max-width: 900px; margin: 0 auto; 
      padding: 20px; display: flex; flex-direction: column; gap: 30px; 
    }

    /* Diseño de la Ficha Horizontal */
    .ficha { 
      display: flex; background: var(--gris-claro); 
      border: 1px solid var(--borde-tarjeta); 
      border-radius: 4px; overflow: hidden; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    /* Columna Izquierda: Foto y Contacto */
    .col-izquierda { 
      width: 300px; min-width: 300px; 
      padding: 15px; display: flex; flex-direction: column; align-items: center; 
      background: #fff; border-right: 1px solid #ddd;
    }

    .foto-marco { 
      width: 270px; height: 340px; 
      border: 3px solid #000; /* Borde negro bien visible */
      margin-bottom: 15px; overflow: hidden; background: #eee;
    }
    .foto-marco img { width: 100%; height: 100%; object-fit: cover; }

    .contacto-pie { 
      font-size: 0.75rem; font-weight: bold; text-align: center; 
      color: #c0392b; line-height: 1.3; text-transform: uppercase;
    }

    /* Columna Derecha: Información Estructurada */
    .col-derecha { 
      flex-grow: 1; padding: 25px; 
      display: flex; flex-direction: column; justify-content: center;
    }

    .info-grupo { margin-bottom: 20px; }
    .info-linea { font-size: 1rem; margin-bottom: 6px; text-transform: uppercase; }
    .info-linea b { color: var(--azul-policia); }

    .loader { text-align: center; padding: 50px; font-weight: bold; }

    /* Adaptación para Celulares */
    @media (max-width: 700px) {
      .ficha { flex-direction: column; }
      .col-izquierda { width: 100%; min-width: 100%; border-right: none; border-bottom: 1px solid #ddd; }
      .col-derecha { padding: 20px; }
    }
  </style>
</head>
<body>

  <header>
    <img src="Diapositiva1-removebg-preview.png" alt="Escudo Policía" class="escudo">
    <h1>Búsqueda de Personas</h1>
    <p>Dirección General Departamentales Norte</p>
  </header>

  <div class="status-bar" id="status-txt">Sincronizando registros oficiales...</div>

  <main id="contenedor-fichas" class="contenedor">
    <div class="loader">Cargando base de datos institucional...</div>
  </main>

  <script>
    function formatDriveLink(url) {
      if (!url) return '';
      const match = url.match(/(?:id=|d\/)([a-zA-Z0-9_-]+)/);
      return match ? `https://lh3.googleusercontent.com/d/${match[1]}` : url;
    }

    async function cargar() {
      try {
        const resp = await fetch('data.json?v=' + Date.now());
        const data = await resp.json();
        const contenedor = document.getElementById('contenedor-fichas');
        const lista = data.registros || [];

        if (lista.length === 0) {
          contenedor.innerHTML = '<div class="loader">No se registran alertas vigentes.</div>';
          return;
        }

        contenedor.innerHTML = lista.map(r => {
          const fotoUrl = formatDriveLink(r.foto);
          return `
          <article class="ficha">
            <div class="col-izquierda">
              <div class="foto-marco">
                <img src="${fotoUrl}" onerror="this.src='https://via.placeholder.com/270x340?text=SIN+IMAGEN'">
              </div>
              <div class="contacto-pie">
                CUALQUIER INFORMACIÓN A:<br>${r.contacto || 'POLICÍA LOCAL'}<br>AL TEL: ${r.telefono || '101 / 911'}
              </div>
            </div>
            
            <div class="col-derecha">
              <div class="info-grupo">
                <div class="info-linea"><b>DESAPARECIDO EN:</b> ${r.localidad || '-'}</div>
                <div class="info-linea"><b>EN FECHA:</b> ${r.fecha || '-'}</div>
                <div class="info-linea"><b>A LAS:</b> ${r.hora || '-'}</div>
              </div>

              <div class="info-grupo">
                <div class="info-linea"><b>NOMBRE COMPLETO:</b> ${r.nombre || 'N/C'}</div>
                <div class="info-linea"><b>EDAD:</b> ${r.edad || '-'} AÑOS</div>
              </div>

              <div class="info-grupo">
                <div class="info-linea"><b>DESCRIPCIÓN:</b></div>
                <div style="font-size: 0.95rem; line-height: 1.4; text-align: justify;">
                  ${r.descripcion || 'Sin descripción adicional disponible.'}
                </div>
              </div>
            </div>
          </article>
          `;
        }).join('');

        document.getElementById('status-txt').innerText = `Sistema actualizado: ${lista.length} alertas vigentes`;

      } catch (e) {
        document.getElementById('contenedor-fichas').innerHTML = '<div class="loader">Error de conexión con la base de datos.</div>';
      }
    }
    window.onload = cargar;
  </script>
</body>
</html>

name: Actualizar datos desde Google Sheets

on:
  schedule:
    - cron: '*/1 * * * *'   # Cada 1 minutos
  workflow_dispatch:          # Ejecución manual desde GitHub

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Descargar hoja "Webdata" como CSV
        run: |
          # sheet=Webdata → solo descarga esa hoja específica
          curl -L \
            "https://docs.google.com/spreadsheets/d/1DiIcQc1ck2Whs4UMUwxvPLfDqVcRf2jVpPmTqAM806E/export?format=csv&sheet=Webdata" \
            -o sheet_raw.csv
          echo "=== Primeras 3 filas del CSV ==="
          head -3 sheet_raw.csv

      - name: Convertir CSV a data.json
        run: |
          python3 << 'PYEOF'
          import csv, json
          from datetime import datetime

          # Índices de columna (base 0) — ajustar si Webdata tiene orden distinto
          COL = {
              "localidad":   3,   # D
              "nombre":      4,   # E
              "edad":        5,   # F
              "fecha":       7,   # H
              "hora":        8,   # I
              "descripcion": 9,   # J
              "contacto":   10,   # K
              "telefono":   11,   # L
              "foto":       13,   # N
              "estado":     14,   # O
          }

          registros = []

          with open("sheet_raw.csv", newline="", encoding="utf-8") as f:
              filas = list(csv.reader(f))

          print(f"Filas totales en CSV (con encabezado): {len(filas)}")

          for i, fila in enumerate(filas[1:], start=2):
              def v(col):
                  return fila[col].strip() if len(fila) > col else ""
              nombre = v(COL["nombre"])
              if not nombre:
                  continue
              estado = v(COL["estado"]).upper()
              if "HALLADO" in estado:
                  print(f"  Fila {i}: '{nombre}' EXCLUIDO (HALLADO)")
                  continue
              registros.append({
                  "localidad":   v(COL["localidad"]),
                  "nombre":      nombre,
                  "edad":        v(COL["edad"]),
                  "fecha":       v(COL["fecha"]),
                  "hora":        v(COL["hora"]),
                  "descripcion": v(COL["descripcion"]),
                  "contacto":    v(COL["contacto"]),
                  "telefono":    v(COL["telefono"]),
                  "foto":        v(COL["foto"]),
                  "estado":      v(COL["estado"]),
              })

          registros.reverse()  # más reciente primero

          output = {
              "actualizado": datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "total":       len(registros),
              "registros":   registros
          }

          with open("data.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"✅ {len(registros)} casos vigentes guardados en data.json")
          PYEOF

      - name: Limpiar CSV temporal
        run: rm -f sheet_raw.csv

      - name: Commit y push si hubo cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "🔄 Datos actualizados $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
